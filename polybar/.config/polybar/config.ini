[colors]
bg = #111111
fg = #cccccc

blue = #81a2be
green = #98c379
yellow = #e5c07b
red = #e06c75
gray = #666666

[bar/main]
width = 100%
height = 26

background = ${colors.bg}
foreground = ${colors.fg}

border-size = 0
line-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = "UbuntuMono Nerd Font Mono:size=12;2"
font-1 = "Cascadia Mono PL:size=12;2"

modules-left = i3
modules-right = btbattery network diskio filesystem cpu memory temperature audio date

tray-position = right

wm-restack = i3
override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
type = internal/i3

format = <label-state>

index-sort = true

wrapping-scroll = false

label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 1

[module/btbattery]
type = custom/script

exec = ~/.local/bin/polybar/bt-battery.sh
tail = true

[module/network]
type = custom/script

exec = ~/.local/bin/polybar/netgraph.sh
tail = true

format = <label>
format-foreground = ${colors.blue}

[module/diskio]
type = custom/script

exec = ~/.local/bin/polybar/diskio.sh
tail = true

format-foreground = ${colors.yellow}

[module/filesystem]
type = internal/fs

interval = 30

mount-0 = /

label-mounted = 󰋊 %percentage_free%%
label-unmounted =

format-mounted-foreground = ${colors.blue}

[module/cpu]
type = custom/script

exec = ~/.local/bin/polybar/cpu.sh
tail = true

format-foreground = ${colors.yellow}

[module/memory]
type = custom/script

exec = ~/.local/bin/polybar/ram.sh
tail = true

format-foreground = ${colors.green}

[module/temperature]
type = custom/script

exec = ~/.local/bin/polybar/temperature.sh

interval = 2

[module/date]
type = internal/date
interval = 1

date = %d/%m/%Y
time = %H:%M:%S

label = %date%  %time%

format = <label>

format-foreground = ${colors.blue}

[module/audio]
type = custom/script
exec = ~/.local/bin/polybar/audio
tail = true
click-left = ~/.local/bin/rofi/audio-channels
click-right = pavucontrol
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
