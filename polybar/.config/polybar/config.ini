[colors]
bg = #111111
bg-alt = #0d0d0d

fg = #cccccc
gray = #666666

blue = #81a2be
green = #98c379
yellow = #e5c07b
red = #e06c75
purple = #bb9af7
green-alt = #9ece6a

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; TOP BAR
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/top]
bottom = false
width = 100%
height = 26

offset-x = 0
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

border-size = 0
line-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-padding = 2
tray-background = ${colors.bg}

override-redirect = false

font-0 = "UbuntuMono Nerd Font Mono:size=12;2"
font-1 = "Cascadia Mono PL:size=12;2"
font-2 = "JetBrainsMono Nerd Font Mono:size=14;4"

modules-left = btbattery ws-icons
modules-right = network diskio filesystem cpu memory temperature audio date

wm-restack = i3

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; I3 WORKSPACES
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;[module/i3]
;type = internal/i3

;index-sort = true
;wrapping-scroll = false
;pin-workspaces = true
;strip-wsnumbers = true

;format = <label-state>

;label-focused =  %{T3} %name% %{T-}
;label-focused-background = ${colors.blue}
;label-focused-foreground = ${colors.bg}
;label-focused-padding = 1

;label-unfocused = %{T3} %name% %{T-}
;label-unfocused-foreground = ${colors.green-alt}
;label-unfocused-padding = 1

;label-visible = %{T3} %name% %{T-}
;label-visible-foreground = ${colors.fg}
;label-visible-padding = 1

;label-urgent =  %{T3} %name% %{T-}
;label-urgent-background = ${colors.red}
;label-urgent-foreground = ${colors.bg}
;label-urgent-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WORKSPACES ICONS
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/ws-icons]
type = custom/script

exec = ~/.local/bin/polybar/ws-icons.py

tail = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BLUETOOTH BATTERY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/btbattery]
type = custom/script

exec = ~/.local/bin/polybar/bt-battery.sh
tail = true

format-foreground = ${colors.purple}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; NETWORK
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/network]
type = custom/script

exec = ~/.local/bin/polybar/netgraph.sh
tail = true

format = <label>
format-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; DISK IO
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/diskio]
type = custom/script

exec = ~/.local/bin/polybar/diskio.sh
tail = true

format-foreground = ${colors.yellow}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; FILESYSTEM
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/filesystem]
type = internal/fs

interval = 30

mount-0 = /

label-mounted = %{T4}󰋜%{T-} %percentage_free%%
label-unmounted =

format-mounted-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CPU
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = custom/script

exec = ~/.local/bin/polybar/cpu.sh
tail = true

format-foreground = ${colors.yellow}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MEMORY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = custom/script

exec = ~/.local/bin/polybar/ram.sh
tail = true

format-foreground = ${colors.green}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; TEMPERATURE
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/temperature]
type = custom/script

exec = ~/.local/bin/polybar/temperature.sh

tail = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; DATE
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/date]
type = internal/date

interval = 1

date = %d/%m/%Y
time = %H:%M:%S

label = %date% %{T4}%{T-} %time%

format = <label>

format-foreground = ${colors.blue}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; AUDIO
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/audio]
type = custom/script

exec = ~/.local/bin/polybar/audio
tail = true

click-left = ~/.local/bin/rofi/audio-channels
click-right = pavucontrol

scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

format-foreground = ${colors.green}
