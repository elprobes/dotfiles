#################################
#           Backend             #
#################################

backend = "glx";
vsync = true;

#################################
#          Shadows              #
#################################

shadow = true;

# 18 era abbastanza pesante.
# 10 mantiene praticamente lo stesso look.
shadow-radius = 10;

shadow-offset-x = -7;
shadow-offset-y = -7;

# leggermente abbassata per ombre più pulite
shadow-opacity = 0.25;

shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'Polybar'",
  "name = 'Notification'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#         Fading                #
#################################

fading = true;

# già molto buoni nel repo originale
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

#################################
#        Transparency           #
#################################

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
#  "95:class_g = 'Alacritty'",
#  "90:class_g = 'Rofi'"
];

#################################
#          Blur                 #
#################################

blur-method = "dual_kawase";

# 6 era costoso.
# 3 è il vero sweet spot prestazioni/estetica.
blur-strength = 3;

# lasciato attivo per NON rompere il look attuale
blur-background = true;

#blur-background-frame = true;
#blur-background-fixed = true;

# lasciata la tua logica originale
blur-background-exclude = [
    "!class_g = 'Rofi'"
];

#################################
#      Rounded Corners          #
#################################

corner-radius = 7;

rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

#################################
#      General Exclusions       #
#################################

focus-exclude = [
  "class_g = 'Cairo-clock'"
];

detect-rounded-corners = true;
detect-client-opacity = true;

#################################
#          Performance          #
#################################

use-damage = true;
detect-transient = true;
detect-client-leader = true;

#################################
#       Window Types            #
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
